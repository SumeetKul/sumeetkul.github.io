name: Publish raw drafts

# When a raw markdown draft (plus its images) is pushed under _drafts_raw/,
# convert it into a dated Jekyll post, copy its images into assets/images/blog/,
# and commit the result back to the branch. The author's only job is to write
# markdown + drop images into _drafts_raw/<slug>/ and push. See POSTING.md.

on:
  push:
    branches:
      - master
    paths:
      - "_drafts_raw/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-draft-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Convert raw drafts into posts
        run: python scripts/publish_draft.py

      - name: Commit generated posts and images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No drafts to publish."
            exit 0
          fi
          git add -A
          git commit -m "Auto-publish draft(s) from _drafts_raw [skip ci]"
          git push
        # Pushes made with the built-in GITHUB_TOKEN do not trigger another
        # workflow run, so this cannot loop.
